<meta name="robots" content="noindex, follow">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
  --sage:  #5ba0a4;
  --stone: #96a8aa;
  --off:   #edeeed;
  --ink:   #080909;
  --ink2:  #0f1010;
  --rule:  rgba(255,255,255,0.055);
  --ease:  cubic-bezier(0.16,1,0.3,1);
  --snap:  cubic-bezier(0.77,0,0.18,1);
  --pad:   48px;
  --t-micro:   10px;
  --t-label:   12px;
  --t-display: clamp(120px,20vw,260px);
  --ls-tight:  .02em;
  --ls-mid:    .20em;
  --ls-wide:   .32em;
}

html{overflow-x:hidden;}
body{
  background:var(--ink);
  color:var(--off);
  font-family:'Barlow',sans-serif;
  font-weight:300;
  cursor:none;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  opacity:0;
  min-height:100svh;
  display:flex;
  flex-direction:column;
}
body.ready{opacity:1;transition:opacity .75s ease;}

:focus{outline:none;}
:focus-visible{outline:2px solid var(--sage);outline-offset:3px;}

#cur{
  position:fixed;z-index:9999;pointer-events:none;
  width:8px;height:8px;border-radius:50%;
  background:var(--sage);
  transform:translate(-50%,-50%);
  mix-blend-mode:difference;
  transition:width .18s var(--ease),height .18s var(--ease);
}
#cur-r{
  position:fixed;z-index:9998;pointer-events:none;
  width:42px;height:42px;border-radius:50%;
  border:1px solid rgba(91,160,164,.32);
  transform:translate(-50%,-50%);
}

#grain{
  position:fixed;inset:-25%;width:150%;height:150%;
  pointer-events:none;z-index:9990;opacity:.026;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:gr .9s steps(2) infinite;
  contain:strict;
  will-change:transform;
}
@keyframes gr{0%,100%{transform:translate3d(0,0,0)}33%{transform:translate3d(-1%,-2%,0)}66%{transform:translate3d(1%,1%,0)}}

#veil{
  position:fixed;inset:0;z-index:10000;
  background:var(--sage);
  clip-path:inset(0 0% 0 0);
  pointer-events:all;
  will-change:clip-path;
}
#veil.gone{
  clip-path:inset(0 100% 0 0);
  pointer-events:none;
  transition:clip-path .75s var(--snap);
}
#veil.instant{
  transition:none !important;
  clip-path:inset(0 100% 0 0) !important;
  pointer-events:none;
}

nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;align-items:center;justify-content:space-between;
  padding:24px var(--pad);
  background:linear-gradient(to bottom,rgba(8,9,9,.72) 0%,transparent 100%);
}
.n-logo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:var(--t-label);font-weight:200;letter-spacing:var(--ls-wide);text-transform:uppercase;
  color:var(--off);text-decoration:none;cursor:none;
  transition:color .25s;
  opacity:0;animation:fd .6s var(--ease) .05s forwards;
}
.n-logo:hover{color:var(--sage);}
.n-logo em{font-style:normal;color:var(--sage);}
@keyframes fd{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── 404 CONTENT ── */
.not-found{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:center;
  padding:var(--pad);
  padding-top:120px;
  position:relative;
  overflow:hidden;
}

.nf-ghost{
  position:absolute;
  font-family:'Barlow Condensed',sans-serif;
  font-size:var(--t-display);
  font-weight:100;
  color:transparent;
  -webkit-text-stroke:1px rgba(91,160,164,.04);
  line-height:1;
  pointer-events:none;
  user-select:none;
  right:-0.05em;
  top:50%;
  transform:translateY(-50%);
  letter-spacing:-.04em;
}

.nf-eyebrow{
  font-family:'Barlow Condensed',sans-serif;
  font-size:var(--t-micro);font-weight:200;letter-spacing:var(--ls-wide);text-transform:uppercase;
  color:var(--sage);
  display:flex;align-items:center;gap:16px;
  margin-bottom:24px;
  opacity:0;animation:fu .7s var(--ease) .2s forwards;
}
.nf-eyebrow-line{width:24px;height:1px;background:var(--sage);flex-shrink:0;}

.nf-heading{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(64px,12vw,172px);
  font-weight:100;line-height:.9;letter-spacing:var(--ls-tight);text-transform:uppercase;
  margin-bottom:32px;
  opacity:0;animation:fu .9s var(--ease) .3s forwards;
}
.nf-heading em{font-style:italic;color:var(--sage);}

.nf-sub{
  font-size:15px;line-height:1.6;
  color:var(--stone);
  max-width:380px;
  margin-bottom:48px;
  opacity:0;animation:fu .8s var(--ease) .45s forwards;
}

.nf-back{
  font-family:'Barlow Condensed',sans-serif;
  font-size:var(--t-micro);font-weight:200;letter-spacing:var(--ls-wide);text-transform:uppercase;
  color:var(--off);text-decoration:none;cursor:none;
  display:inline-flex;align-items:center;gap:12px;
  border:1px solid rgba(255,255,255,.15);
  padding:16px 28px;
  transition:border-color .25s,color .25s,background .25s;
  position:relative;
  opacity:0;animation:fu .8s var(--ease) .58s forwards;
}
.nf-back:hover{border-color:var(--sage);color:var(--sage);}
.nf-back::before{
  content:'←';
  transition:transform .3s var(--ease);
}
.nf-back:hover::before{transform:translateX(-4px);}

footer{
  padding:24px var(--pad);
  border-top:1px solid var(--rule);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--ink2);
}
.f-logo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:var(--t-label);font-weight:200;letter-spacing:var(--ls-mid);text-transform:uppercase;
  color:var(--stone);
}
.f-logo em{font-style:normal;color:var(--sage);}
.f-copy{
  font-family:'Barlow Condensed',sans-serif;
  font-size:var(--t-micro);font-weight:200;letter-spacing:var(--ls-mid);text-transform:uppercase;
  color:rgba(122,148,150,.35);
}

@media(pointer:coarse){
  #cur,#cur-r{display:none !important;}
  body{cursor:auto;}
  a{cursor:pointer;}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important;}
  #grain{display:none;}
}
@media(max-width:768px){
  :root{--pad:24px;}
  footer{flex-direction:column;gap:8px;text-align:center;}
}
</style>
</head>
<body>

<div id="veil"></div>
<div id="cur"></div>
<div id="cur-r"></div>
<div id="grain"></div>

<nav aria-label="Main navigation">
  <a href="index.html" class="n-logo">Kieran <em>Green</em></a>
</nav>

<main class="not-found" aria-labelledby="nf-title">
  <div class="nf-ghost" aria-hidden="true">404</div>
  <p class="nf-eyebrow"><span class="nf-eyebrow-line"></span>Error 404</p>
  <h1 class="nf-heading" id="nf-title">Page<br><em>not found.</em></h1>
  <p class="nf-sub">That URL doesn't exist — it may have moved or never existed. Head back to the portfolio and find something real.</p>
  <a href="index.html" class="nf-back">Back to portfolio</a>
</main>

<footer role="contentinfo">
  <div class="f-logo">Kieran <em>Green</em> — Industrial Designer</div>
  <div class="f-copy">© <span id="copy-year"></span> — All rights reserved</div>
</footer>

<script>
/* ── CURSOR ── */
const cur  = document.getElementById('cur');
const curR = document.getElementById('cur-r');
let mx = window.innerWidth/2, my = window.innerHeight/2;
let rx = mx, ry = my;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cur.style.left = mx + 'px'; cur.style.top = my + 'px';
});
if (window.matchMedia('(pointer:fine)').matches) {
  (function loop(){
    const rxNew = rx + (mx - rx) * .1;
    const ryNew = ry + (my - ry) * .1;
    if (Math.abs(rxNew - rx) > 0.02 || Math.abs(ryNew - ry) > 0.02) {
      rx = rxNew; ry = ryNew;
      curR.style.left = rx + 'px'; curR.style.top = ry + 'px';
    }
    requestAnimationFrame(loop);
  })();
}
document.querySelectorAll('a').forEach(el => {
  el.addEventListener('mouseenter', () => { cur.style.width = '5px'; cur.style.height = '5px'; });
  el.addEventListener('mouseleave', () => { cur.style.width = '8px'; cur.style.height = '8px'; });
});
document.addEventListener('mouseleave', () => { cur.style.opacity='0'; curR.style.opacity='0'; });
document.addEventListener('mouseenter', () => { cur.style.opacity='1'; curR.style.opacity='1'; });

/* ── VEIL + READY ── */
const veil = document.getElementById('veil');
function navigateTo(href) {
  veil.style.transition = 'clip-path .5s cubic-bezier(0.77,0,0.18,1)';
  veil.style.clipPath = 'inset(0 0% 0 0)';
  setTimeout(() => { window.location.href = href; }, 520);
}
requestAnimationFrame(() => {
  document.body.classList.add('ready');
  veil.classList.add('gone');
});
window.addEventListener('pageshow', e => {
  if (e.persisted) {
    veil.classList.remove('gone');
    veil.classList.add('instant');
    document.body.classList.add('ready');
    void veil.offsetWidth;
    veil.classList.remove('instant');
  }
});
document.addEventListener('click', e => {
  const a = e.target.closest('a[href]');
  if (!a) return;
  const href = a.getAttribute('href');
  if (!href || href.startsWith('#') || href.startsWith('http')) return;
  e.preventDefault();
  navigateTo(href);
});

/* ── COPYRIGHT YEAR ── */
document.getElementById('copy-year').textContent = new Date().getFullYear();
</script>
</body>
</html>
