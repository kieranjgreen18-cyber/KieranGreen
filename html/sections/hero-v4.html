<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kieran Green — Industrial Designer</title>
<meta name="description" content="Kieran Green is an industrial designer specialising in CAD modeling, surface development, and product visualization using Rhino 3D.">

<!-- model-viewer -->
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

<!-- Google Fonts: Josefin Sans + Nunito -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100;0,300;0,400;0,600;0,700;1,100;1,300;1,400&family=Nunito:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════════════════════
   TOKENS
════════════════════════════════════════════════════════ */
:root {
  /* Background — very dark, slight cool-green tint like anodized steel */
  --bg:          #0c0f0e;
  --bg2:         #121614;
  --bg3:         #181c1a;

  /* Text — slightly cooler white, less parchment */
  --primary:     #dde6e2;
  --secondary:   #6e8480;
  --muted:       rgba(221,230,226,0.25);

  /* Accent — verdigris: the colour of patina on precision instruments.
     Saturated enough to pop on near-black, reads as material not lifestyle. */
  --accent:      #5BA898;
  --accent-dim:  rgba(91,168,152,0.15);
  --accent-glow: rgba(91,168,152,0.35);
  --accent-hi:   #7BBFB2;       /* lighter hover state */

  /* Rules & structure */
  --rule:        rgba(91,168,152,0.10);
  --rule-bright: rgba(91,168,152,0.24);

  /* Fonts */
  --f-display: 'Josefin Sans', sans-serif;
  --f-body:    'Nunito', sans-serif;

  /* Scale — pulled back so headline occupies left ~45%, car breathes on right */
  --t-hero:  clamp(40px, 6.8vw, 88px);
  --t-sub:   clamp(12px, 1.1vw, 14px);
  --t-micro: 10px;

  --pad:  clamp(28px, 5vw, 64px);
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --dur:  0.9s;

  --z-bg:     0;
  --z-grid:   1;
  --z-model:  2;
  --z-wash:   3;
  --z-deco:   4;
  --z-text:   10;
  --z-nav:    50;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { overflow-x: hidden; }
body {
  background: var(--bg);
  color: var(--primary);
  font-family: var(--f-body);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}


/* ════════════════════════════════════════════════════════
   NAV
════════════════════════════════════════════════════════ */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: var(--z-nav);
  padding: 20px var(--pad);
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.5s ease, border-color 0.5s ease;
  border-bottom: 1px solid transparent;
}
nav.scrolled {
  background: rgba(12,15,14,0.90);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom-color: var(--rule);
}

/* Logo: bold last name, light first name, accent slash between */
.nav-logo {
  font-family: var(--f-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  text-decoration: none;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 0;
}
.nav-logo .first  { font-weight: 300; color: var(--secondary); }
.nav-logo .slash  { color: var(--accent); margin: 0 6px; font-weight: 300; }
.nav-logo .last   { font-weight: 700; color: var(--primary); }

.nav-links {
  display: flex;
  align-items: center;
  gap: 40px;
  list-style: none;
}
.nav-links a {
  font-family: var(--f-display);
  font-size: var(--t-micro);
  font-weight: 400;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--secondary);
  text-decoration: none;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--accent); }

.nav-avail {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--f-display);
  font-size: var(--t-micro);
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
}
.avail-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
  flex-shrink: 0;
  animation: pulse 2.8s ease infinite;
}
@keyframes pulse {
  0%,100% { opacity:1;   box-shadow: 0 0 8px var(--accent-glow); }
  50%     { opacity:0.4; box-shadow: 0 0 0   transparent; }
}

/* ════════════════════════════════════════════════════════
   HERO SHELL
════════════════════════════════════════════════════════ */
.hero {
  position: relative;
  width: 100%;
  height: 100svh;
  min-height: 600px;
  overflow: hidden;
  background: var(--bg);
}

/* ── DRAFTING GRID — teal-tinted, very faint ── */
.hero-grid {
  position: absolute;
  inset: 0;
  z-index: var(--z-grid);
  pointer-events: none;
  background-image:
    linear-gradient(to right,  rgba(91,168,152,0.05) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(91,168,152,0.05) 1px, transparent 1px),
    linear-gradient(to right,  rgba(91,168,152,0.02) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(91,168,152,0.02) 1px, transparent 1px);
  background-size:
    128px 128px,
    128px 128px,
    32px  32px,
    32px  32px;
}

/* ── AMBIENT GLOW — cool teal-green atmosphere ── */
.hero-glow {
  position: absolute;
  inset: 0;
  z-index: var(--z-bg);
  pointer-events: none;
  background:
    /* Main accent bloom — right side where car lives */
    radial-gradient(ellipse 60% 70% at 80% 50%, rgba(91,168,152,0.09) 0%, transparent 65%),
    /* Upper sky — deeper blue-green */
    radial-gradient(ellipse 55% 45% at 70% 5%,  rgba(40,100,120,0.12) 0%, transparent 60%),
    /* Floor — very subtle warm ground bounce */
    radial-gradient(ellipse 70% 35% at 65% 100%, rgba(60,120,100,0.08) 0%, transparent 55%);
}

/* ── MODEL VIEWER — full bleed ── */
model-viewer {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  z-index: var(--z-model);
  background: transparent;
  display: block;
  --progress-bar-color: var(--accent);
  --progress-bar-height: 1px;
  --poster-color: #0c0f0e;
}
model-viewer::part(default-progress-bar) {
  background: var(--accent);
  height: 1px;
}

/* ── DARK WASH — left panel readability, matching dark bg ── */
.hero-wash {
  position: absolute;
  inset: 0;
  z-index: var(--z-wash);
  pointer-events: none;
  background:
    linear-gradient(
      to right,
      rgba(16,14,12,0.97)  0%,
      rgba(16,14,12,0.92) 12%,
      rgba(16,14,12,0.72) 28%,
      rgba(16,14,12,0.35) 46%,
      rgba(16,14,12,0.08) 60%,
      transparent         70%
    ),
    linear-gradient(
      to top,
      rgba(16,14,12,0.92)  0%,
      rgba(16,14,12,0.40)  8%,
      transparent          20%
    ),
    linear-gradient(
      to bottom,
      rgba(16,14,12,0.55)  0%,
      transparent          14%
    );
}

/* ── CONSTRUCTION LINES — horizontal rules like an ID sketch sheet ── */
/*
   Three very thin horizontal lines crossing the full width.
   Positioned at meaningful optical divisions.
   The middle one aligns with the headline cap-height roughly.
*/
.hero-rules {
  position: absolute;
  inset: 0;
  z-index: var(--z-deco);
  pointer-events: none;
}
.hero-rules::before,
.hero-rules::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 1px;
}
.hero-rules::before {
  top: 20%;
  background: linear-gradient(to right, transparent 0%, var(--rule-bright) 5%, var(--rule) 40%, transparent 70%);
}
.hero-rules::after {
  bottom: 18%;
  background: linear-gradient(to right, transparent 0%, var(--rule-bright) 5%, var(--rule) 35%, transparent 65%);
}

/* ── CORNER MARKS — technical drawing registration ── */
/*
   Four-corner tick marks. The kind you see on ID presentation sheets
   and engineering drawings. Adds drafting-table authenticity.
*/
.hero-corner {
  position: absolute;
  z-index: var(--z-deco);
  pointer-events: none;
  width: 20px; height: 20px;
}
.hero-corner::before,
.hero-corner::after {
  content: '';
  position: absolute;
  background: var(--copper);
  opacity: 0.35;
}
.hero-corner.tl { top: 18px; left: 18px; }
.hero-corner.br { bottom: 18px; right: 18px; }

.hero-corner.tl::before { top:0; left:0; width:1px; height:14px; }
.hero-corner.tl::after  { top:0; left:0; width:14px; height:1px; }
.hero-corner.br::before { bottom:0; right:0; width:1px; height:14px; }
.hero-corner.br::after  { bottom:0; right:0; width:14px; height:1px; }

/* ════════════════════════════════════════════════════════
   TEXT BLOCK
════════════════════════════════════════════════════════ */
.hero-text {
  position: absolute;
  bottom: clamp(52px, 9vh, 110px);
  left: var(--pad);
  z-index: var(--z-text);
  max-width: 58vw;
  display: flex;
  flex-direction: column;
  gap: 18px;
  opacity: 0;
  transform: translateY(28px);
  transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
}
.hero-text.is-revealed { opacity:1; transform:translateY(0); }

/* Eyebrow — with a running rule before it */
.hero-eyebrow {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: var(--f-display);
  font-size: var(--t-micro);
  font-weight: 400;
  letter-spacing: 0.30em;
  text-transform: uppercase;
  color: var(--copper);
  opacity: 0;
  transform: translateX(-14px);
  transition: opacity 0.5s var(--ease) 0.10s, transform 0.5s var(--ease) 0.10s;
}
.hero-text.is-revealed .hero-eyebrow { opacity:1; transform:translateX(0); }

/* Eyebrow tick — single line, clean */
.eyebrow-rule {
  display: block;
  width: 0;
  height: 1px;
  background: var(--copper);
  flex-shrink: 0;
  opacity: 0.7;
  transition: width 0.9s var(--ease) 0.28s;
}
.hero-text.is-revealed .eyebrow-rule { width: 32px; }

/* ── HEADLINE ──
   The key typographic idea:
   "IMAGINING" + "YOUR" → full weight, warm white, ultra tight
   "FUTURE,"            → thin/100 weight, copper — the California warmth
   "TODAY."             → full weight again, warm white
   
   This weight contrast (700 ↔ 100 in same face) is exactly what
   gives those Sunset Garage logos their graphic confidence.
   The thin line reads as an architectural section cut.
*/
.hero-h1 {
  font-family: var(--f-display);
  font-size: var(--t-hero);
  font-weight: 700;
  line-height: 0.88;
  letter-spacing: 0.01em;
  text-transform: uppercase;
  color: var(--primary);
}
.hero-h1 .line {
  display: block;
  overflow: hidden;
  padding-bottom: 0.06em;
  margin-bottom: -0.06em;
}
.hero-h1 .word {
  display: inline-block;
  opacity: 0;
  transform: translateY(52px);
  transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
  will-change: transform, opacity;
}
.hero-text.is-revealed .hero-h1 .line:nth-child(1) .word { opacity:1; transform:none; transition-delay:0.22s; }
.hero-text.is-revealed .hero-h1 .line:nth-child(2) .word { opacity:1; transform:none; transition-delay:0.34s; }
.hero-text.is-revealed .hero-h1 .line:nth-child(3) .word { opacity:1; transform:none; transition-delay:0.46s; }
.hero-text.is-revealed .hero-h1 .line:nth-child(4) .word { opacity:1; transform:none; transition-delay:0.58s; }

/* The accent line — thin weight, copper, slightly wider tracking */
.hero-h1 .accent {
  font-weight: 100;
  color: var(--copper);
  letter-spacing: 0.06em;
}

/* Sub-copy */
.hero-sub {
  font-family: var(--f-body);
  font-size: var(--t-sub);
  font-weight: 400;
  line-height: 1.80;
  color: var(--secondary);
  max-width: 340px;
  letter-spacing: 0.02em;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.7s var(--ease) 0.65s, transform 0.7s var(--ease) 0.65s;
}
.hero-text.is-revealed .hero-sub { opacity:1; transform:translateY(0); }

/* CTA row */
.hero-cta {
  display: flex;
  align-items: center;
  gap: 24px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.7s var(--ease) 0.80s, transform 0.7s var(--ease) 0.80s;
}
.hero-text.is-revealed .hero-cta { opacity:1; transform:translateY(0); }

/* Primary — copper filled pill */
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--copper);
  color: var(--bg);
  border: none;
  border-radius: 2px;          /* square-ish, not bubbly — industrial */
  padding: 12px 26px;
  font-family: var(--f-display);
  font-size: var(--t-micro);
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  transition: background 0.25s, transform 0.2s var(--ease), box-shadow 0.25s;
  box-shadow: 0 4px 24px rgba(200,137,58,0.25);
}
.btn-primary:hover {
  background: var(--horizon);
  transform: translateY(-2px);
  box-shadow: 0 8px 36px rgba(200,137,58,0.35);
}
.btn-primary svg { transition: transform 0.25s var(--ease); }
.btn-primary:hover svg { transform: translateX(3px); }

/* Ghost — just a ruled underline, very spare */
.btn-ghost {
  font-family: var(--f-display);
  font-size: var(--t-micro);
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--secondary);
  text-decoration: none;
  border-bottom: 1px solid var(--rule-bright);
  padding-bottom: 3px;
  transition: color 0.2s, border-color 0.2s;
}
.btn-ghost:hover { color: var(--copper); border-color: var(--copper); }

/* ════════════════════════════════════════════════════════
   SCROLL HINT
════════════════════════════════════════════════════════ */
.hero-scroll {
  position: absolute;
  bottom: clamp(24px, 4vh, 48px);
  left: 50%;
  transform: translateX(-50%);
  z-index: var(--z-text);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  font-family: var(--f-display);
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--secondary);
  opacity: 0;
  transition: opacity 0.7s var(--ease) 1.0s;
}
.hero-scroll.is-revealed { opacity: 0.5; }

.scroll-line {
  width: 1px;
  height: 48px;
  background: linear-gradient(to bottom, var(--copper), transparent);
  animation: scrollDrop 2.4s ease infinite;
}
@keyframes scrollDrop {
  0%,100% { opacity:0.5; transform:scaleY(1); }
  50%     { opacity:1.0; transform:scaleY(0.6) translateY(4px); }
}

/* ════════════════════════════════════════════════════════
   MODEL CHROME
════════════════════════════════════════════════════════ */
.model-label {
  position: absolute;
  bottom: 22px;
  right: var(--pad);
  z-index: var(--z-text);
  font-family: var(--f-display);
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(200,137,58,0.22);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.9s var(--ease) 1.1s;
}
.model-label.is-revealed { opacity:1; }

.model-hint {
  position: absolute;
  bottom: 22%;
  left: 62%;
  transform: translateX(-50%);
  z-index: var(--z-text);
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--f-display);
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: rgba(200,137,58,0.40);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.8s var(--ease) 1.3s;
  white-space: nowrap;
}
.model-hint.is-revealed { opacity:1; }
.model-hint.hidden      { opacity:0 !important; transition-duration:0.6s !important; }

.hint-icon {
  width: 15px; height: 15px;
  border: 1px solid rgba(200,137,58,0.30);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  animation: spin 6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ════════════════════════════════════════════════════════
   GRAIN — very faint, warm-toned
════════════════════════════════════════════════════════ */
.grain {
  position: fixed;
  inset: -25%;
  width: 150%; height: 150%;
  pointer-events: none;
  z-index: 60;
  opacity: 0.032;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation: grain 0.9s steps(2) infinite;
  will-change: transform;
}
@keyframes grain {
  0%,100% { transform: translate3d(0,0,0); }
  33%     { transform: translate3d(-1%,-2%,0); }
  66%     { transform: translate3d(1%,1%,0); }
}

/* ════════════════════════════════════════════════════════
   REDUCED MOTION
════════════════════════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .hero-text, .hero-eyebrow, .hero-h1 .word,
  .hero-sub, .hero-cta, .hero-scroll,
  .model-label, .model-hint {
    opacity: 1 !important; transform: none !important;
  }
  .eyebrow-rule { width: 32px !important; }
  .grain { display: none; }
}

/* ════════════════════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════════════════════ */
@media (max-width: 860px) {
  .hero-text  { max-width: 78vw; }
  .model-label { display: none; }
  .hero-wash {
    background:
      linear-gradient(to right,  rgba(16,14,12,0.97) 0%, rgba(16,14,12,0.78) 32%, rgba(16,14,12,0.28) 60%, transparent 80%),
      linear-gradient(to top,    rgba(16,14,12,0.92) 0%, rgba(16,14,12,0.40) 8%,  transparent 20%),
      linear-gradient(to bottom, rgba(16,14,12,0.55) 0%, transparent 14%);
  }
}

@media (max-width: 520px) {
  .hero-text  { max-width: calc(100vw - var(--pad) * 2); bottom: 88px; }
  .hero-scroll { display: none; }
  .model-hint  { display: none; }
  .nav-links   { display: none; }
  .hero-rules  { display: none; }
  .hero-wash {
    background:
      linear-gradient(to top,    rgba(16,14,12,0.97) 0%, rgba(16,14,12,0.58) 20%, transparent 44%),
      linear-gradient(to bottom, rgba(16,14,12,0.50) 0%, transparent 14%),
      linear-gradient(to right,  rgba(16,14,12,0.72) 0%, rgba(16,14,12,0.18) 55%, transparent 72%);
  }
}
</style>
</head>
<body>

<div class="grain" aria-hidden="true"></div>

<!-- NAV -->
<nav id="nav">
  <a href="/" class="nav-logo">
    <span class="first">Kieran</span>
    <span class="slash">/</span>
    <span class="last">Green</span>
  </a>
  <ul class="nav-links">
    <li><a href="#projects">Projects</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <div class="nav-avail">
    <span class="avail-dot"></span>
    Available
  </div>
</nav>

<!-- HERO -->
<section class="hero" aria-labelledby="hero-heading">

  <!-- Ambient glow behind model -->
  <div class="hero-glow"  aria-hidden="true"></div>

  <!-- Technical grid substrate -->
  <div class="hero-grid"  aria-hidden="true"></div>

  <!-- 3D Model -->
  <model-viewer
    id="mini-viewer"
    src="https://kieran-green.com/assets/models/minisite.glb"
    alt="Interactive 3D model of Kieran Green's Mini Clubman — drag to explore"
    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="3deg"
    skybox-image="https://kieran-green.com/assets/images/151_hdrmaps_com_free_4K.hdr"
    skybox-height="1.2m"
    shadow-intensity="2.2"
    shadow-softness="0.5"
    exposure="0.72"
    camera-orbit="-100deg 182deg 50%"
    min-camera-orbit="auto 84deg auto"
    max-camera-orbit="auto 98deg auto"
    field-of-view="18deg"
    min-field-of-view="14deg"
    max-field-of-view="24deg"
    interaction-prompt="none"
    ar
    ar-modes="webxr scene-viewer quick-look"
    loading="eager"
    tone-mapping="commerce"
  ></model-viewer>

  <!-- Dark wash -->
  <div class="hero-wash"  aria-hidden="true"></div>

  <!-- Horizontal construction rules -->
  <div class="hero-rules" aria-hidden="true"></div>

  <!-- Corner registration marks -->
  <div class="hero-corner tl" aria-hidden="true"></div>
  <div class="hero-corner br" aria-hidden="true"></div>

  <!-- Text -->
  <div class="hero-text" id="hero-text">

    <div class="hero-eyebrow">
      <span class="eyebrow-rule"></span>
      Industrial Designer
    </div>

    <h1 class="hero-h1" id="hero-heading">
      <span class="line"><span class="word">Imagining</span></span>
      <span class="line"><span class="word">your</span></span>
      <span class="line"><span class="word"><span class="accent">Future,</span></span></span>
      <span class="line"><span class="word">Today.</span></span>
    </h1>

    <p class="hero-sub">
      CAD modeling, form development, and product visualization —
      from first sketch to something you can hold.
    </p>

    <div class="hero-cta">
      <a href="#projects" class="btn-primary">
        View work
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M1.5 6h9M6.5 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <a href="#about" class="btn-ghost">About me</a>
    </div>

  </div>

  <!-- Scroll -->
  <div class="hero-scroll" id="hero-scroll" aria-hidden="true">
    <div class="scroll-line"></div>
    Scroll
  </div>

  <!-- Model label -->
  <span class="model-label" id="model-label" aria-hidden="true">
    Mini Clubman · Rhino 3D · FDM
  </span>

  <!-- Drag hint -->
  <div class="model-hint" id="model-hint" aria-hidden="true">
    <div class="hint-icon">↻</div>
    Drag to rotate
  </div>

</section>

<script>
'use strict';

/* REVEAL */
const heroText   = document.getElementById('hero-text');
const heroScroll = document.getElementById('hero-scroll');
const modelLabel = document.getElementById('model-label');
const modelHint  = document.getElementById('model-hint');

function revealHero() {
  requestAnimationFrame(() => {
    heroText.classList.add('is-revealed');
    heroScroll.classList.add('is-revealed');
    modelLabel.classList.add('is-revealed');
    modelHint.classList.add('is-revealed');
  });
}
if (document.readyState === 'complete') setTimeout(revealHero, 80);
else window.addEventListener('load', () => setTimeout(revealHero, 80));

/* NAV scroll state */
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });

/* MODEL VIEWER */
const viewer = document.getElementById('mini-viewer');
const hint   = document.getElementById('model-hint');

let hintDone = false;
function dismissHint() {
  if (hintDone) return;
  hintDone = true;
  hint.classList.add('hidden');
}
viewer.addEventListener('camera-change', dismissHint, { once: true });
setTimeout(dismissHint, 5000);

viewer.addEventListener('error', () => {
  console.warn('[model-viewer] load error:', viewer.src);
});

function pauseRotate()  { viewer.removeAttribute('auto-rotate'); }
function resumeRotate() { setTimeout(() => viewer.setAttribute('auto-rotate', ''), 800); }
viewer.addEventListener('mousedown',  pauseRotate);
viewer.addEventListener('mouseup',    resumeRotate);
viewer.addEventListener('mouseleave', resumeRotate);
viewer.addEventListener('touchstart', pauseRotate,  { passive: true });
viewer.addEventListener('touchend',   resumeRotate);

viewer.addEventListener('load', async () => {
  await viewer.updateComplete;
  viewer.jumpCameraToGoal();
});

/* Material override — deep copper-bronze body, matte dark panels */
viewer.addEventListener('load', async () => {
  await viewer.updateComplete;
  const model = viewer.model;
  if (!model?.materials?.length) return;
  const skipRe = /glass|window|lens|tyre|tire|rubber|wheel|chrome|mirror/i;
  const bodyRe = /body|paint|panel|car|exterior|shell|chassis/i;
  let bodyFound = false;
  model.materials.forEach((mat, i) => {
    const name = mat.name || '';
    if (skipRe.test(name)) return;
    const pbr = mat.pbrMetallicRoughness;
    if (!pbr) return;
    if (bodyRe.test(name) || (!bodyFound && i === 0)) {
      bodyFound = true;
      /* Dark copper bronze — reads as premium raw material */
      pbr.setBaseColorFactor([0.08, 0.045, 0.018, 1.0]);
      pbr.setMetallicFactor(0.15);
      pbr.setRoughnessFactor(0.42);
    } else {
      pbr.setBaseColorFactor([0.04, 0.035, 0.028, 1.0]);
      pbr.setMetallicFactor(0.40);
      pbr.setRoughnessFactor(0.50);
    }
  });
});

/* Scroll / zoom conflict resolution */
const hero = document.querySelector('.hero');
hero.addEventListener('wheel', (e) => {
  if (e.ctrlKey || e.metaKey) return;
  e.preventDefault();
  e.stopPropagation();
  window.scrollBy({ top: e.deltaY, left: e.deltaX, behavior: 'auto' });
}, { passive: false });

let t0y = 0, t0x = 0, tScrolling = null;
hero.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) { t0y = e.touches[0].clientY; t0x = e.touches[0].clientX; tScrolling = null; }
}, { passive: true });
hero.addEventListener('touchmove', (e) => {
  if (e.touches.length !== 1) return;
  const dy = t0y - e.touches[0].clientY;
  const dx = t0x - e.touches[0].clientX;
  if (tScrolling === null) {
    if (Math.abs(dy) < 8 && Math.abs(dx) < 8) return;
    tScrolling = Math.abs(dy) > Math.abs(dx) * 1.4;
  }
  if (tScrolling) {
    e.preventDefault();
    window.scrollBy({ top: dy * 1.6, behavior: 'auto' });
    t0y = e.touches[0].clientY;
    t0x = e.touches[0].clientX;
  }
}, { passive: false });
</script>

</body>
</html>
