<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kieran Green — Industrial Designer</title>
<meta name="description" content="Kieran Green is an industrial designer specialising in CAD modeling, surface development, and product visualization using Rhino 3D.">

<!-- model-viewer -->
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

<!-- Google Fonts: Josefin Sans (display) + Nunito (body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100;0,300;0,400;0,600;0,700;1,100;1,300;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ── TOKENS ── */
:root {
  --cream:      #F5EFE3;
  --warm-off:   #EDE5D4;
  --terracotta: #C4673A;
  --sage:       #7A9E7E;
  --dusty-rose: #C4907A;
  --warm-dark:  #2B2118;
  --mid:        #6B5A4E;
  --light-mid:  #9E8C7E;

  --f-display: 'Josefin Sans', sans-serif;
  --f-body:    'Nunito', sans-serif;

  --t-hero:  clamp(56px, 11vw, 140px);
  --t-sub:   clamp(13px, 1.2vw, 15px);
  --t-micro: 10.5px;

  --pad: clamp(28px, 5vw, 60px);
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --dur: 0.9s;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { overflow-x: hidden; }
body {
  background: var(--cream);
  color: var(--warm-dark);
  font-family: var(--f-body);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  padding: 22px var(--pad);
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.4s ease;
}
nav.scrolled {
  background: rgba(245,239,227,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(43,33,24,0.08);
}

.nav-logo {
  font-family: var(--f-display);
  font-size: 14px;
  font-weight: 600;
  color: var(--warm-dark);
  text-decoration: none;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}
.nav-logo span {
  color: var(--terracotta);
  font-weight: 300;
  letter-spacing: 0.28em;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 36px;
  list-style: none;
}
.nav-links a {
  font-family: var(--f-display);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--mid);
  text-decoration: none;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--terracotta); }

.nav-avail {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: var(--f-display);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--sage);
}
.avail-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--sage);
  animation: pulse 2.5s ease infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(122,158,126,0.5); }
  50%     { opacity:0.6; box-shadow: 0 0 0 5px rgba(122,158,126,0); }
}

/* ── HERO SHELL ── */
.hero {
  position: relative;
  width: 100%;
  height: 100svh;
  min-height: 600px;
  overflow: hidden;
  background: var(--cream);
}

/* ── SKY GRADIENT — warm sunset behind the model ── */
.hero-sky {
  position: absolute;
  inset: 0;
  z-index: 0;
  /* layered warm sky: teal-to-coral-to-gold, like the Sandia reference */
  background:
    radial-gradient(ellipse 110% 70% at 68% 30%, rgba(196,103,58,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 80% 90% at 80% 10%, rgba(82,160,168,0.22) 0%, transparent 55%),
    linear-gradient(175deg,
      #c8e8e4 0%,
      #dde8c4 18%,
      #f0dfc0 42%,
      #e8c4a0 65%,
      #d4906a 85%,
      #c47850 100%
    );
}

/* ── WARM CREAM WASH — text-side readability ── */
.hero-wash {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    linear-gradient(
      to right,
      rgba(245,239,227,0.97)  0%,
      rgba(245,239,227,0.88) 14%,
      rgba(245,239,227,0.62) 30%,
      rgba(245,239,227,0.22) 48%,
      rgba(245,239,227,0.04) 62%,
      transparent            72%
    ),
    linear-gradient(
      to top,
      rgba(245,239,227,0.60) 0%,
      transparent            20%
    ),
    linear-gradient(
      to bottom,
      rgba(245,239,227,0.40) 0%,
      transparent            12%
    );
}

/* ── MODEL VIEWER ── */
model-viewer {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 2;
  background: transparent;
  display: block;
  --progress-bar-color: var(--terracotta);
  --progress-bar-height: 2px;
  --poster-color: transparent;
}
model-viewer::part(default-progress-bar) {
  background: var(--terracotta);
  height: 2px;
}

/* ── DECORATIVE ARC — top-left geometry ── */
.hero-arc {
  position: absolute;
  top: -120px;
  left: -120px;
  width: 420px;
  height: 420px;
  border-radius: 50%;
  border: 1.5px solid rgba(196,103,58,0.18);
  z-index: 3;
  pointer-events: none;
}
.hero-arc::before {
  content: '';
  position: absolute;
  inset: 30px;
  border-radius: 50%;
  border: 1px solid rgba(196,103,58,0.10);
}

/* ── TEXT BLOCK ── */
.hero-text {
  position: absolute;
  bottom: clamp(48px, 8vh, 100px);
  left: var(--pad);
  z-index: 10;
  max-width: 56vw;
  display: flex;
  flex-direction: column;
  gap: 20px;
  opacity: 0;
  transform: translateY(28px);
  transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
}
.hero-text.is-revealed { opacity: 1; transform: translateY(0); }

/* Eyebrow */
.hero-eyebrow {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: var(--f-display);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--terracotta);
  opacity: 0;
  transform: translateX(-14px);
  transition: opacity 0.5s var(--ease) 0.1s, transform 0.5s var(--ease) 0.1s;
}
.hero-text.is-revealed .hero-eyebrow { opacity: 1; transform: translateX(0); }

.eyebrow-ornament {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}
.eyebrow-ornament span {
  display: block;
  height: 1px;
  background: var(--terracotta);
  opacity: 0.6;
}
.eyebrow-ornament span:nth-child(1) { width: 20px; }
.eyebrow-ornament span:nth-child(2) { width: 6px; }
.eyebrow-ornament span:nth-child(3) { width: 3px; }

/* H1 */
.hero-h1 {
  font-family: var(--f-display);
  font-size: var(--t-hero);
  font-weight: 700;
  line-height: 0.90;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  color: var(--warm-dark);
}
.hero-h1 .line {
  display: block;
  overflow: hidden;
  padding-bottom: 0.06em;
  margin-bottom: -0.06em;
}
.hero-h1 .word {
  display: inline-block;
  opacity: 0;
  transform: translateY(48px);
  transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
  will-change: transform, opacity;
}
.hero-text.is-revealed .hero-h1 .line:nth-child(1) .word { opacity:1; transform:none; transition-delay:0.22s; }
.hero-text.is-revealed .hero-h1 .line:nth-child(2) .word { opacity:1; transform:none; transition-delay:0.34s; }
.hero-text.is-revealed .hero-h1 .line:nth-child(3) .word { opacity:1; transform:none; transition-delay:0.46s; }
.hero-text.is-revealed .hero-h1 .line:nth-child(4) .word { opacity:1; transform:none; transition-delay:0.58s; }

/* Accent word — lighter weight + terracotta, still uppercase */
.hero-h1 .accent {
  color: var(--terracotta);
  font-weight: 300;
  letter-spacing: 0.04em;
}

/* Sub */
.hero-sub {
  font-family: var(--f-body);
  font-size: var(--t-sub);
  font-weight: 400;
  line-height: 1.75;
  color: var(--mid);
  max-width: 360px;
  letter-spacing: 0.02em;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.7s var(--ease) 0.65s, transform 0.7s var(--ease) 0.65s;
}
.hero-text.is-revealed .hero-sub { opacity: 1; transform: translateY(0); }

/* CTA row */
.hero-cta {
  display: flex;
  align-items: center;
  gap: 20px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.7s var(--ease) 0.80s, transform 0.7s var(--ease) 0.80s;
}
.hero-text.is-revealed .hero-cta { opacity: 1; transform: translateY(0); }

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--terracotta);
  color: #fff;
  border: none;
  border-radius: 100px;
  padding: 13px 28px;
  font-family: var(--f-display);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  transition: background 0.25s, transform 0.25s var(--ease), box-shadow 0.25s;
  box-shadow: 0 4px 24px rgba(196,103,58,0.28);
}
.btn-primary:hover {
  background: #b35c30;
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(196,103,58,0.38);
}
.btn-primary svg { transition: transform 0.25s var(--ease); }
.btn-primary:hover svg { transform: translateX(3px); }

.btn-ghost {
  font-family: var(--f-display);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--mid);
  text-decoration: none;
  border-bottom: 1px solid rgba(107,90,78,0.3);
  padding-bottom: 2px;
  transition: color 0.2s, border-color 0.2s;
}
.btn-ghost:hover { color: var(--terracotta); border-color: var(--terracotta); }

/* ── SCROLL HINT ── */
.hero-scroll {
  position: absolute;
  bottom: clamp(28px, 5vh, 56px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  font-family: var(--f-display);
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--light-mid);
  opacity: 0;
  transition: opacity 0.7s var(--ease) 1.0s;
}
.hero-scroll.is-revealed { opacity: 0.7; }
.scroll-line {
  width: 1px;
  height: 44px;
  background: linear-gradient(to bottom, var(--terracotta), transparent);
  animation: scrollDrop 2.4s ease infinite;
}
@keyframes scrollDrop {
  0%,100% { opacity:0.5; transform:scaleY(1) translateY(0); }
  50%     { opacity:1; transform:scaleY(0.65) translateY(4px); }
}

/* ── MODEL LABEL ── */
.model-label {
  position: absolute;
  bottom: 20px;
  right: var(--pad);
  z-index: 10;
  font-family: var(--f-display);
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(196,103,58,0.28);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.9s var(--ease) 1.1s;
}
.model-label.is-revealed { opacity: 1; }

/* ── DRAG HINT ── */
.model-hint {
  position: absolute;
  bottom: 22%;
  left: 62%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--f-display);
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: rgba(196,103,58,0.45);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.8s var(--ease) 1.3s;
  white-space: nowrap;
}
.model-hint.is-revealed { opacity: 1; }
.model-hint.hidden { opacity: 0 !important; transition-duration: 0.6s !important; }
.hint-icon {
  width: 16px; height: 16px;
  border: 1.5px solid rgba(196,103,58,0.35);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  animation: spin 6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── REDUCED MOTION ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .hero-text, .hero-eyebrow, .hero-h1 .word,
  .hero-sub, .hero-cta, .hero-scroll, .model-label, .model-hint {
    opacity: 1 !important;
    transform: none !important;
  }
}

/* ── RESPONSIVE ── */
@media (max-width: 860px) {
  .hero-text { max-width: 76vw; }
  .model-label { display: none; }
  .hero-wash {
    background:
      linear-gradient(to right, rgba(245,239,227,0.97) 0%, rgba(245,239,227,0.75) 34%, rgba(245,239,227,0.25) 62%, transparent 80%),
      linear-gradient(to top, rgba(245,239,227,0.60) 0%, transparent 20%),
      linear-gradient(to bottom, rgba(245,239,227,0.40) 0%, transparent 12%);
  }
}

@media (max-width: 520px) {
  .hero-text { max-width: calc(100vw - var(--pad) * 2); bottom: 80px; }
  .hero-scroll { display: none; }
  .model-hint { display: none; }
  .nav-links { display: none; }
  .hero-wash {
    background:
      linear-gradient(to top, rgba(245,239,227,0.97) 0%, rgba(245,239,227,0.60) 22%, transparent 46%),
      linear-gradient(to bottom, rgba(245,239,227,0.45) 0%, transparent 14%),
      linear-gradient(to right, rgba(245,239,227,0.70) 0%, transparent 65%);
  }
}
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <a href="/" class="nav-logo">Kieran <span>Green</span></a>
  <ul class="nav-links">
    <li><a href="#projects">Projects</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <div class="nav-avail">
    <span class="avail-dot"></span>
    Available
  </div>
</nav>

<!-- HERO -->
<section class="hero" aria-labelledby="hero-heading">

  <!-- Sky gradient -->
  <div class="hero-sky" aria-hidden="true"></div>

  <!-- Decorative arc -->
  <div class="hero-arc" aria-hidden="true"></div>

  <!-- 3D Model -->
  <model-viewer
    id="mini-viewer"
    src="https://kieranjgreen18-cyber.github.io/KieranGreen/minisite.glb"
    alt="Interactive 3D model of Kieran Green's Mini Clubman — drag to explore"
    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="3deg"
    skybox-image="https://modelviewer.dev/shared-assets/environments/spruit_sunrise_1k_HDR.hdr"
    skybox-height="1.2m"
    shadow-intensity="1.8"
    shadow-softness="0.6"
    exposure="1.1"
    camera-orbit="-20deg 92deg 50%"
    min-camera-orbit="auto 84deg auto"
    max-camera-orbit="auto 98deg auto"
    field-of-view="18deg"
    min-field-of-view="14deg"
    max-field-of-view="24deg"
    interaction-prompt="none"
    ar
    ar-modes="webxr scene-viewer quick-look"
    loading="eager"
    tone-mapping="commerce"
  ></model-viewer>

  <!-- Warm wash over model -->
  <div class="hero-wash" aria-hidden="true"></div>

  <!-- Text -->
  <div class="hero-text" id="hero-text">

    <div class="hero-eyebrow">
      <div class="eyebrow-ornament">
        <span></span><span></span><span></span>
      </div>
      Industrial Designer
    </div>

    <h1 class="hero-h1" id="hero-heading">
      <span class="line"><span class="word">Imagining</span></span>
      <span class="line"><span class="word">your</span></span>
      <span class="line"><span class="word"><span class="accent">Future,</span></span></span>
      <span class="line"><span class="word">Today.</span></span>
    </h1>

    <p class="hero-sub">
      CAD modeling, form development, and product visualization —
      from first sketch to something you can hold.
    </p>

    <div class="hero-cta">
      <a href="#projects" class="btn-primary">
        View work
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M2 6.5h9M7 2.5l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <a href="#about" class="btn-ghost">About me</a>
    </div>

  </div>

  <!-- Scroll -->
  <div class="hero-scroll" id="hero-scroll" aria-hidden="true">
    <div class="scroll-line"></div>
    Scroll
  </div>

  <!-- Model label -->
  <span class="model-label" id="model-label" aria-hidden="true">
    Mini Clubman · Rhino 3D · FDM
  </span>

  <!-- Drag hint -->
  <div class="model-hint" id="model-hint" aria-hidden="true">
    <div class="hint-icon">↻</div>
    Drag to rotate
  </div>

</section>

<script>
'use strict';

/* REVEAL */
const heroText   = document.getElementById('hero-text');
const heroScroll = document.getElementById('hero-scroll');
const modelLabel = document.getElementById('model-label');
const modelHint  = document.getElementById('model-hint');

function revealHero() {
  requestAnimationFrame(() => {
    heroText.classList.add('is-revealed');
    heroScroll.classList.add('is-revealed');
    modelLabel.classList.add('is-revealed');
    modelHint.classList.add('is-revealed');
  });
}
if (document.readyState === 'complete') setTimeout(revealHero, 80);
else window.addEventListener('load', () => setTimeout(revealHero, 80));

/* NAV scroll state */
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });

/* MODEL VIEWER */
const viewer  = document.getElementById('mini-viewer');
const hint    = document.getElementById('model-hint');

let hintDone = false;
function dismissHint() {
  if (hintDone) return;
  hintDone = true;
  hint.classList.add('hidden');
}
viewer.addEventListener('camera-change', dismissHint, { once: true });
setTimeout(dismissHint, 5000);

viewer.addEventListener('error', () => {
  console.warn('[model-viewer] load error:', viewer.src);
});

function pauseRotate()  { viewer.removeAttribute('auto-rotate'); }
function resumeRotate() { setTimeout(() => viewer.setAttribute('auto-rotate', ''), 800); }
viewer.addEventListener('mousedown',  pauseRotate);
viewer.addEventListener('mouseup',    resumeRotate);
viewer.addEventListener('mouseleave', resumeRotate);
viewer.addEventListener('touchstart', pauseRotate,  { passive: true });
viewer.addEventListener('touchend',   resumeRotate);

viewer.addEventListener('load', async () => {
  await viewer.updateComplete;
  viewer.jumpCameraToGoal();
});

/* Material override — warm terracotta-adjacent for the body panels */
viewer.addEventListener('load', async () => {
  await viewer.updateComplete;
  const model = viewer.model;
  if (!model?.materials?.length) return;
  const skipRe = /glass|window|lens|tyre|tire|rubber|wheel|chrome|mirror/i;
  const bodyRe = /body|paint|panel|car|exterior|shell|chassis/i;
  let bodyFound = false;
  model.materials.forEach((mat, i) => {
    const name = mat.name || '';
    if (skipRe.test(name)) return;
    const pbr = mat.pbrMetallicRoughness;
    if (!pbr) return;
    if (bodyRe.test(name) || (!bodyFound && i === 0)) {
      bodyFound = true;
      /* Deep warm clay — sits well against cream/terracotta palette */
      pbr.setBaseColorFactor([0.14, 0.06, 0.03, 1.0]);
      pbr.setMetallicFactor(0.0);
      pbr.setRoughnessFactor(0.38);
    } else {
      pbr.setBaseColorFactor([0.06, 0.05, 0.04, 1.0]);
      pbr.setMetallicFactor(0.25);
      pbr.setRoughnessFactor(0.58);
    }
  });
});

/* Scroll / zoom conflict resolution */
const hero = document.querySelector('.hero');
hero.addEventListener('wheel', (e) => {
  if (e.ctrlKey || e.metaKey) return;
  e.preventDefault();
  e.stopPropagation();
  window.scrollBy({ top: e.deltaY, left: e.deltaX, behavior: 'auto' });
}, { passive: false });

let t0y = 0, t0x = 0, tScrolling = null;
hero.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) { t0y = e.touches[0].clientY; t0x = e.touches[0].clientX; tScrolling = null; }
}, { passive: true });
hero.addEventListener('touchmove', (e) => {
  if (e.touches.length !== 1) return;
  const dy = t0y - e.touches[0].clientY;
  const dx = t0x - e.touches[0].clientX;
  if (tScrolling === null) {
    if (Math.abs(dy) < 8 && Math.abs(dx) < 8) return;
    tScrolling = Math.abs(dy) > Math.abs(dx) * 1.4;
  }
  if (tScrolling) {
    e.preventDefault();
    window.scrollBy({ top: dy * 1.6, behavior: 'auto' });
    t0y = e.touches[0].clientY;
    t0x = e.touches[0].clientX;
  }
}, { passive: false });
</script>

</body>
</html>
