<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kieran Green — Industrial Designer</title>
<meta name="description" content="Kieran Green is an industrial designer specialising in CAD modeling, surface development, and product visualization using Rhino 3D.">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23080909'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='18' font-weight='300' fill='%235ba0a4'>K</text></svg>">

<!-- model-viewer -->
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

<!-- Preload WOFF2 fonts — only weights actually used -->
<link rel="preload" as="font" type="font/woff2" href="https://kieranjgreen18-cyber.github.io/KieranGreen/AnyConv.com__D-DINCondensed.woff2" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="https://kieranjgreen18-cyber.github.io/KieranGreen/AnyConv.com__D-DIN.woff2" crossorigin>

<style>
/* ════════════════════════════════════════════════════════════════════
   § 1 · DESIGN TOKENS
   Single source of truth. Verbatim from index.html where they exist,
   extended only for hero-specific needs. Never set values ad hoc.
════════════════════════════════════════════════════════════════════ */
:root {
  /* Colour palette */
  --c-bg:        #080909;
  --c-bg2:       #0f1010;
  --c-primary:   #edeeed;
  --c-secondary: #96a8aa;
  --c-accent:    #5ba0a4;
  --c-rule:      rgba(255,255,255,0.055);
  --c-muted:     rgba(150,168,170,0.35);

  /* Fonts */
  --f-condensed: 'D-DIN Condensed', sans-serif;
  --f-body:      'D-DIN', sans-serif;

  /* Type scale — verbatim from index.html */
  --t-hero:  clamp(68px, 12vw, 156px);
  --t-body:  17px;
  --t-ui:    15px;
  --t-micro: 11px;

  /* Letter spacing */
  --ls-zero:    -0.04em;
  --ls-tight:    0.01em;
  --ls-stencil:  0.22em;

  /* Line heights */
  --lh-display: 0.87;
  --lh-body:    1.85;

  /* Spacing scale — 8px base, matches index.html exactly */
  --sp-1:  8px;
  --sp-2:  16px;
  --sp-3:  24px;
  --sp-4:  32px;
  --sp-5:  40px;
  --sp-6:  48px;
  --sp-7:  64px;
  --sp-8:  80px;
  --sp-9:  96px;
  --sp-10: 120px;

  /* Layout */
  --pad: clamp(24px, 4vw, 48px);

  /* Motion — consistent easing across the whole module */
  --ease:     cubic-bezier(0.16, 1, 0.3, 1);
  --snap:     cubic-bezier(0.77, 0, 0.18, 1);
  --ease-out: cubic-bezier(0.0, 0, 0.2, 1);
  --dur-fast: 0.5s;
  --dur-med:  0.75s;
  --dur-slow: 1.0s;

  /* Z-index layers — named, never magic numbers */
  --z-viewer:   0;
  --z-vignette: 10;
  --z-text:     20;
  --z-nav:      50;
  --z-grain:    60;
}

/* ════════════════════════════════════════════════════════════════════
   § 2 · FONTS
   WOFF2 first (perf). OTF fallback. Only weights in use are loaded.
════════════════════════════════════════════════════════════════════ */
@font-face {
  font-family: 'D-DIN';
  src: url('https://kieranjgreen18-cyber.github.io/KieranGreen/AnyConv.com__D-DIN.woff2') format('woff2'),
       url('https://kieranjgreen18-cyber.github.io/KieranGreen/D-DIN.otf') format('opentype');
  font-weight: 300 400; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'D-DIN';
  src: url('https://kieranjgreen18-cyber.github.io/KieranGreen/AnyConv.com__D-DIN-Italic.woff2') format('woff2'),
       url('https://kieranjgreen18-cyber.github.io/KieranGreen/D-DIN-Italic.otf') format('opentype');
  font-weight: 300 400; font-style: italic; font-display: swap;
}
@font-face {
  font-family: 'D-DIN';
  src: url('https://kieranjgreen18-cyber.github.io/KieranGreen/AnyConv.com__D-DIN-Bold.woff2') format('woff2'),
       url('https://kieranjgreen18-cyber.github.io/KieranGreen/D-DIN-Bold.otf') format('opentype');
  font-weight: 700; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'D-DIN Condensed';
  src: url('https://kieranjgreen18-cyber.github.io/KieranGreen/AnyConv.com__D-DINCondensed.woff2') format('woff2'),
       url('https://kieranjgreen18-cyber.github.io/KieranGreen/D-DINCondensed.otf') format('opentype');
  font-weight: 100 400; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'D-DIN Condensed';
  src: url('https://kieranjgreen18-cyber.github.io/KieranGreen/AnyConv.com__D-DINCondensed-Bold.woff2') format('woff2'),
       url('https://kieranjgreen18-cyber.github.io/KieranGreen/D-DINCondensed-Bold.otf') format('opentype');
  font-weight: 700 900; font-style: normal; font-display: swap;
}

/* ════════════════════════════════════════════════════════════════════
   § 3 · RESET & BASE
════════════════════════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  overflow-x: hidden;
  scroll-behavior: auto;
  -webkit-text-size-adjust: 100%;
}

body {
  background: var(--c-bg);
  color: var(--c-primary);
  font-family: var(--f-body);
  font-size: var(--t-body);
  font-weight: 300;
  line-height: var(--lh-body);
  letter-spacing: var(--ls-tight);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

:focus         { outline: none; }
:focus-visible { outline: 2px solid var(--c-accent); outline-offset: 3px; }
img            { display: block; max-width: 100%; }

/* ════════════════════════════════════════════════════════════════════
   § 4 · TYPOGRAPHY ROLES
   Reusable semantic classes. Apply to elements, not ad hoc styles.
════════════════════════════════════════════════════════════════════ */

/* Hero display headline */
.type-hero {
  font-family: var(--f-condensed);
  font-size: var(--t-hero);
  font-weight: 100;
  letter-spacing: var(--ls-zero);
  line-height: var(--lh-display);
  text-transform: uppercase;
}

/* Micro labels — eyebrows, nav, metadata */
.type-micro {
  font-family: var(--f-condensed);
  font-size: var(--t-micro);
  font-weight: 700;
  letter-spacing: var(--ls-stencil);
  text-transform: uppercase;
  line-height: 1;
}

/* UI sub-copy — caption, descriptor */
.type-ui {
  font-family: var(--f-body);
  font-size: var(--t-ui);
  font-weight: 300;
  letter-spacing: 0.04em;
  line-height: 1.75;
  text-transform: uppercase;
}

/* Italic accent — shared across heading roles */
.type-hero em, h1 em, h2 em, h3 em {
  font-style: italic;
  color: var(--c-accent);
  letter-spacing: -0.03em;
  font-weight: inherit;
}

/* ════════════════════════════════════════════════════════════════════
   § 5 · GRAIN OVERLAY
   Fixed, full-bleed, hardware-accelerated. Matches index.html #grain.
════════════════════════════════════════════════════════════════════ */
.grain {
  position: fixed;
  inset: -25%;
  width: 150%; height: 150%;
  pointer-events: none;
  z-index: var(--z-grain);
  opacity: 0.026;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation: grain 0.9s steps(2) infinite;
  contain: strict;
  will-change: transform;
}
@keyframes grain {
  0%,100% { transform: translate3d(0,0,0); }
  33%     { transform: translate3d(-1%,-2%,0); }
  66%     { transform: translate3d(1%,1%,0); }
}



/* ════════════════════════════════════════════════════════════════════
   § 7 · HERO SHELL
   Full-bleed stacking context.

   Layer order (z-index):
     0   model-viewer        — HDRI fills 100vw × 100svh
     10  .hero-vignette      — left-panel gradient + top/bottom fades
     20  .hero-text, UI chrome
     50  nav
     60  .grain
════════════════════════════════════════════════════════════════════ */
.hero {
  position: relative;
  width: 100%;
  height: 100svh;
  overflow: hidden;
}

/* ── model-viewer: full bleed ── */
model-viewer {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  z-index: var(--z-viewer);
  background: transparent;
  display: block;
  --progress-bar-color: var(--c-accent);
  --progress-bar-height: 1px;
  --poster-color: #080909;
}
model-viewer::part(default-progress-bar) {
  background: var(--c-accent);
  height: 1px;
}

/* ════════════════════════════════════════════════════════════════════
   § 8 · VIGNETTE
   Left panel: text readability. Right ~36%: open to HDRI sky.
   Top + bottom: nav transition + next-section prep.
   Multi-stop S-curve — smooth photographic falloff.
════════════════════════════════════════════════════════════════════ */
.hero-vignette {
  position: absolute;
  inset: 0;
  z-index: var(--z-vignette);
  pointer-events: none;
  will-change: opacity;
  background:
    linear-gradient(
      to right,
      rgba(8,9,9,0.97)  0%,
      rgba(8,9,9,0.90) 10%,
      rgba(8,9,9,0.70) 24%,
      rgba(8,9,9,0.35) 40%,
      rgba(8,9,9,0.08) 54%,
      transparent      64%
    ),
    linear-gradient(
      to top,
      rgba(8,9,9,0.95)  0%,
      rgba(8,9,9,0.45)  7%,
      transparent      18%
    ),
    linear-gradient(
      to bottom,
      rgba(8,9,9,0.60)  0%,
      transparent      16%
    );
}

/* ════════════════════════════════════════════════════════════════════
   § 9 · TEXT OVERLAY
   Anchored bottom-left. Matches index.html hero text position:
   padding: 0 var(--pad) var(--sp-8) → bottom: var(--sp-8).

   Container fades + slides up on reveal.
   Each child has its own staggered transition for layered depth.
════════════════════════════════════════════════════════════════════ */
.hero-text {
  position: absolute;
  bottom: var(--sp-8);
  left: var(--pad);
  z-index: var(--z-text);
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
  max-width: 50vw;
  /* Container entrance */
  opacity: 0;
  transform: translateY(24px);
  transition:
    opacity   var(--dur-slow) var(--ease),
    transform var(--dur-slow) var(--ease);
}
.hero-text.is-revealed { opacity: 1; transform: translateY(0); }

/* Eyebrow — slides in from left */
.hero-eyebrow {
  color: var(--c-accent);
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  opacity: 0;
  transform: translateX(-16px);
  transition:
    opacity   var(--dur-fast) var(--ease) 0.10s,
    transform var(--dur-fast) var(--ease) 0.10s;
}
.hero-text.is-revealed .hero-eyebrow {
  opacity: 1;
  transform: translateX(0);
}

/* Eyebrow line — grows from zero width */
.hero-eyebrow-line {
  display: block;
  width: 0;
  height: 1px;
  background: var(--c-accent);
  flex-shrink: 0;
  transition: width 0.8s var(--ease) 0.28s;
}
.hero-text.is-revealed .hero-eyebrow-line { width: var(--sp-4); }

/* H1 lines — each clips and slides up */
.hero-h1 .line {
  display: block;
  overflow: hidden;
  padding-bottom: 0.05em;  /* prevents descender clip during slide */
  margin-bottom: -0.05em;
}
.hero-h1 .word {
  display: inline-block;
  opacity: 0;
  transform: translateY(52px) skewY(2deg);
  transition:
    opacity   var(--dur-slow) var(--ease),
    transform var(--dur-slow) var(--ease);
  will-change: transform, opacity;
}

/* Staggered delays — identical cadence to index.html */
.hero-text.is-revealed .hero-h1 .line:nth-child(1) .word { opacity:1; transform:none; transition-delay: 0.24s; }
.hero-text.is-revealed .hero-h1 .line:nth-child(2) .word { opacity:1; transform:none; transition-delay: 0.36s; }
.hero-text.is-revealed .hero-h1 .line:nth-child(3) .word { opacity:1; transform:none; transition-delay: 0.48s; }
.hero-text.is-revealed .hero-h1 .line:nth-child(4) .word { opacity:1; transform:none; transition-delay: 0.60s; }

/* Sub-copy */
.hero-sub {
  color: var(--c-primary);
  max-width: 340px;
  opacity: 0;
  transform: translateY(12px);
  transition:
    opacity   var(--dur-med) var(--ease) 0.68s,
    transform var(--dur-med) var(--ease) 0.68s;
}
.hero-text.is-revealed .hero-sub { opacity: 0.55; transform: translateY(0); }

/* Availability badge */
.hero-avail {
  color: var(--c-accent);
  display: flex;
  align-items: center;
  gap: var(--sp-1);
  opacity: 0;
  transform: translateY(8px);
  transition:
    opacity   var(--dur-med) var(--ease) 0.80s,
    transform var(--dur-med) var(--ease) 0.80s;
}
.hero-text.is-revealed .hero-avail { opacity: 1; transform: translateY(0); }

.hero-avail-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--c-accent);
  box-shadow: 0 0 8px rgba(91,160,164,0.8);
  flex-shrink: 0;
  animation: pulse 2.5s ease infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1;   box-shadow: 0 0 8px rgba(91,160,164,0.8); }
  50%     { opacity: 0.3; box-shadow: 0 0 0   rgba(91,160,164,0);   }
}

/* ════════════════════════════════════════════════════════════════════
   § 10 · SCROLL HINT
   Bottom-right. Matches index.html's .hero-scroll-hint exactly.
════════════════════════════════════════════════════════════════════ */
.hero-scroll {
  position: absolute;
  bottom: var(--sp-8);
  right: var(--pad);
  z-index: var(--z-text);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: var(--c-secondary);
  opacity: 0;
  transition: opacity var(--dur-med) var(--ease) 0.95s;
}
.hero-scroll.is-revealed { opacity: 0.6; }

.hero-scroll-line {
  width: 1px;
  height: var(--sp-6);
  background: linear-gradient(to bottom, var(--c-secondary), transparent);
  animation: scrollPulse 2.2s ease infinite;
}
@keyframes scrollPulse {
  0%,100% { opacity: 0.4; transform: scaleY(1); }
  50%     { opacity: 0.9; transform: scaleY(0.6); }
}

/* ════════════════════════════════════════════════════════════════════
   § 11 · MODEL UI CHROME
   Bottom-right metadata label. Drag hint centred on car.
   Both reveal with the main text system.
════════════════════════════════════════════════════════════════════ */
.model-label {
  position: absolute;
  z-index: var(--z-text);
  pointer-events: none;
  color: rgba(91,160,164,0.18);
  opacity: 0;
  transition: opacity var(--dur-slow) var(--ease) 1.1s;
}
.model-label.is-revealed { opacity: 1; }
.model-label-br {
  bottom: var(--sp-2);
  right: var(--sp-3);
  text-align: right;
}



/* Drag hint */
.model-hint {
  position: absolute;
  bottom: 22%; left: 62%;
  transform: translateX(-50%);
  z-index: var(--z-text);
  color: rgba(91,160,164,0.38);
  display: flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity var(--dur-med) var(--ease) 1.3s;
}
.model-hint.is-revealed { opacity: 1; }
.model-hint.hidden       { opacity: 0 !important; transition-duration: 0.8s !important; }

.model-hint-icon {
  width: 14px; height: 14px;
  border: 1px solid rgba(91,160,164,0.28);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  animation: hintSpin 6s linear infinite;
}
@keyframes hintSpin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* Error fallback */
.model-error {
  display: none;
  position: absolute; inset: 0;
  z-index: var(--z-text);
  align-items: center; justify-content: center;
  flex-direction: column;
  gap: var(--sp-2);
  color: rgba(91,160,164,0.35);
  text-align: center;
}
.model-error.visible { display: flex; }

/* ════════════════════════════════════════════════════════════════════
   § 12 · SHARED KEYFRAMES
════════════════════════════════════════════════════════════════════ */
@keyframes fd {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ════════════════════════════════════════════════════════════════════
   § 13 · RESPONSIVE
════════════════════════════════════════════════════════════════════ */
@media (max-width: 860px) {
  .hero-text   { max-width: 78vw; }
  .hero-scroll { display: none; }
  .hero-coords { display: none; }

  .hero-vignette {
    background:
      linear-gradient(to right,   rgba(8,9,9,0.97) 0%, rgba(8,9,9,0.75) 28%, rgba(8,9,9,0.25) 58%, transparent 78%),
      linear-gradient(to top,     rgba(8,9,9,0.95) 0%, rgba(8,9,9,0.45) 7%,  transparent 18%),
      linear-gradient(to bottom,  rgba(8,9,9,0.60) 0%, transparent 16%);
  }
}

@media (max-width: 480px) {
  .hero-text {
    bottom: var(--sp-6);
    max-width: calc(100vw - (var(--pad) * 2));
  }
  .model-label-br { display: none; }
  .model-hint     { display: none; }

  .hero-vignette {
    background:
      linear-gradient(to top,    rgba(8,9,9,0.97) 0%, rgba(8,9,9,0.55) 18%, transparent 42%),
      linear-gradient(to bottom, rgba(8,9,9,0.50) 0%, transparent 14%),
      linear-gradient(to right,  rgba(8,9,9,0.75) 0%, rgba(8,9,9,0.20) 55%, transparent 72%);
  }
}

/* ════════════════════════════════════════════════════════════════════
   § 14 · REDUCED MOTION
   All transitions collapse to instant. Elements immediately visible.
════════════════════════════════════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .hero-text, .hero-eyebrow, .hero-h1 .word,
  .hero-sub, .hero-avail, .hero-scroll,
  .model-label, .model-hint, .hero-coords,
  .nav-logo, .nav-right { opacity: 1 !important; transform: none !important; }
  .hero-eyebrow-line { width: var(--sp-4) !important; }
  .grain { display: none; }
}
</style>
</head>
<body>

<!-- Grain — fixed above everything, matches index.html -->
<div class="grain" aria-hidden="true"></div>

<!-- ── HERO ── -->
<section class="hero" aria-labelledby="hero-heading">

  <!--
    MODEL-VIEWER — full-screen. HDRI is both skybox + lighting.

    Camera settings:
      azimuth   -20deg  → car sits right-of-centre
      elevation  92deg  → just below horizon (low automotive angle)
      radius     50%    → tight crop
      FOV        18deg  → cinematic telephoto compression

    Rotation:
      3deg/s auto-rotate → barely perceptible slow spin
      Pauses on mousedown/touchstart, resumes 800ms after release

    Scroll/zoom conflict:
      Wheel → intercepted, forwarded to window.scrollBy
      Touch vertical swipe → intercepted, forwarded to window.scrollBy
      Touch pinch → passes through to model-viewer unmodified
      See § SCROLL/ZOOM in JS for full notes + future engine hook.
  -->
  <model-viewer
    id="mini-viewer"
    src="https://kieranjgreen18-cyber.github.io/KieranGreen/minisite.glb"
    alt="Interactive 3D model of Kieran Green's Mini Clubman — drag to explore"
    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="3deg"
    skybox-image="https://modelviewer.dev/shared-assets/environments/spruit_sunrise_1k_HDR.hdr"
    skybox-height="1.2m"
    shadow-intensity="2.0"
    shadow-softness="0.7"
    exposure="0.9"
    camera-orbit="-20deg 92deg 50%"
    min-camera-orbit="auto 84deg auto"
    max-camera-orbit="auto 98deg auto"
    field-of-view="18deg"
    min-field-of-view="14deg"
    max-field-of-view="24deg"
    interaction-prompt="none"
    ar
    ar-modes="webxr scene-viewer quick-look"
    loading="eager"
    tone-mapping="commerce"
  ></model-viewer>

  <!-- Left-panel vignette — gradient only, no pseudo-elements -->
  <div class="hero-vignette" aria-hidden="true"></div>

  <!-- Text block — bottom-left -->
  <div class="hero-text" id="hero-text">

    <p class="hero-eyebrow type-micro" aria-hidden="true">
      <span class="hero-eyebrow-line"></span>
      Industrial Designer
    </p>

    <h1 class="hero-h1 type-hero" id="hero-heading">
      <span class="line"><span class="word">Imagining</span></span>
      <span class="line"><span class="word">your</span></span>
      <span class="line"><span class="word"><em>future,</em></span></span>
      <span class="line"><span class="word">today.</span></span>
    </h1>

    <p class="hero-sub type-ui">
      CAD modeling, form development, and product visualization —
      from first sketch to something you can hold.
    </p>

    <div class="hero-avail type-micro" aria-label="Currently available for work">
      <div class="hero-avail-dot" aria-hidden="true"></div>
      Available
    </div>

  </div>

  <!-- Scroll hint — bottom-right -->
  <div class="hero-scroll type-micro" id="hero-scroll" aria-hidden="true">
    <div class="hero-scroll-line"></div>
    Scroll
  </div>

  <!-- Bottom-right metadata -->
  <span class="model-label model-label-br type-micro" id="model-label" aria-hidden="true">
    MINI CLUBMAN · RHINO 3D · FDM
  </span>

  <!-- Drag affordance — centred on car -->
  <div class="model-hint type-micro" id="model-hint" aria-hidden="true">
    <div class="model-hint-icon" aria-hidden="true">↻</div>
    Drag to rotate
  </div>

  <!-- Error fallback (GLB load failure only) -->
  <div class="model-error" id="model-error" role="alert" aria-live="assertive">
    <span class="type-micro">Model unavailable</span>
    <span class="type-micro" style="opacity:.4;">CHECK GLB PATH</span>
  </div>

</section>

<script>
'use strict';

/* ════════════════════════════════════════════════════════════════════
   § REVEAL SYSTEM
   .is-revealed triggers all CSS transitions in sequence.
   Waits for load + rAF to ensure layout + fonts are stable.
════════════════════════════════════════════════════════════════════ */
const heroText   = document.getElementById('hero-text');
const heroScroll = document.getElementById('hero-scroll');
const modelLabel = document.getElementById('model-label');
const modelHint  = document.getElementById('model-hint');

function revealHero() {
  requestAnimationFrame(() => {
    heroText.classList.add('is-revealed');
    heroScroll.classList.add('is-revealed');
    modelLabel.classList.add('is-revealed');
    modelHint.classList.add('is-revealed');
  });
}

if (document.readyState === 'complete') {
  setTimeout(revealHero, 80);
} else {
  window.addEventListener('load', () => setTimeout(revealHero, 80));
}

/* ════════════════════════════════════════════════════════════════════
   § NAV — scrolled state
════════════════════════════════════════════════════════════════════ */
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });

/* ════════════════════════════════════════════════════════════════════
   § MODEL-VIEWER — INTERACTIONS
════════════════════════════════════════════════════════════════════ */
const viewer  = document.getElementById('mini-viewer');
const hint    = document.getElementById('model-hint');
const errorEl = document.getElementById('model-error');

/* Drag hint — dismiss on first camera move or after 5s */
let hintDone = false;
function dismissHint() {
  if (hintDone) return;
  hintDone = true;
  hint.classList.add('hidden');
}
viewer.addEventListener('camera-change', dismissHint, { once: true });
setTimeout(dismissHint, 5000);

/* Error state */
viewer.addEventListener('error', () => {
  errorEl.classList.add('visible');
  console.warn('[model-viewer] load error:', viewer.src);
});

/* Auto-rotate — pause on drag, resume 800ms after release */
function pauseRotate()  { viewer.removeAttribute('auto-rotate'); }
function resumeRotate() { setTimeout(() => viewer.setAttribute('auto-rotate', ''), 800); }

viewer.addEventListener('mousedown',  pauseRotate);
viewer.addEventListener('mouseup',    resumeRotate);
viewer.addEventListener('mouseleave', resumeRotate);
viewer.addEventListener('touchstart', pauseRotate,  { passive: true });
viewer.addEventListener('touchend',   resumeRotate);

/* Snap to defined start angle immediately on load */
viewer.addEventListener('load', async () => {
  await viewer.updateComplete;
  viewer.jumpCameraToGoal();
});

/* ════════════════════════════════════════════════════════════════════
   § AUTOMOTIVE PAINT MATERIAL OVERRIDE
   Fires post-load. Upgrades body panels to deep BRG with clearcoat.
   Glass, rubber, wheels, chrome are skipped (keep GLB originals).
════════════════════════════════════════════════════════════════════ */
viewer.addEventListener('load', async () => {
  await viewer.updateComplete;
  const model = viewer.model;
  if (!model?.materials?.length) return;

  const skipRe = /glass|window|lens|tyre|tire|rubber|wheel|chrome|mirror/i;
  const bodyRe = /body|paint|panel|car|exterior|shell|chassis/i;
  let bodyFound = false;

  model.materials.forEach((mat, i) => {
    const name = mat.name || '';
    if (skipRe.test(name)) return;
    const pbr = mat.pbrMetallicRoughness;
    if (!pbr) return;

    if (bodyRe.test(name) || (!bodyFound && i === 0)) {
      bodyFound = true;
      pbr.setBaseColorFactor([0.012, 0.048, 0.022, 1.0]); /* deep British Racing Green */
      pbr.setMetallicFactor(0.0);
      pbr.setRoughnessFactor(0.36);
      if (mat.extensions?.KHR_materials_clearcoat) {
        mat.extensions.KHR_materials_clearcoat.clearcoatFactor          = 1.0;
        mat.extensions.KHR_materials_clearcoat.clearcoatRoughnessFactor = 0.06;
      }
    } else {
      pbr.setBaseColorFactor([0.04, 0.04, 0.04, 1.0]);
      pbr.setMetallicFactor(0.3);
      pbr.setRoughnessFactor(0.55);
    }
  });
});

/* ════════════════════════════════════════════════════════════════════
   § SCROLL / ZOOM CONFLICT RESOLUTION
   ─────────────────────────────────────────────────────────────────
   model-viewer captures pointer events by default, blocking the
   page scroll engine when the cursor is over the canvas.

   WHEEL — intercept on hero (non-passive, so preventDefault works).
   Kill the event before model-viewer sees it; forward deltaY to
   window.scrollBy. Mouse drag (pointerdown) is unaffected — the
   model still rotates on drag.

   TOUCH — all events reach model-viewer by default (needed for
   drag-rotate + pinch-zoom). We detect a clearly vertical single-
   finger swipe (|dy| > |dx| × 1.4 after an 8px dead zone) and
   redirect to window.scrollBy. Two-finger gestures are never
   intercepted; pinch-zoom works fully.

   FUTURE SCROLL ENGINE INTEGRATION:
   → Delete the wheel listener below. Your engine owns the wheel.
   → Keep touch forwarding, or use ScrollTrigger.normalizeScroll().
   → No changes to model-viewer itself are needed.
════════════════════════════════════════════════════════════════════ */
const hero = document.querySelector('.hero');

hero.addEventListener('wheel', (e) => {
  if (e.ctrlKey || e.metaKey) return; /* pass browser zoom through */
  e.preventDefault();
  e.stopPropagation();
  window.scrollBy({ top: e.deltaY, left: e.deltaX, behavior: 'auto' });
}, { passive: false });

let t0y = 0, t0x = 0, tScrolling = null;

hero.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    t0y = e.touches[0].clientY;
    t0x = e.touches[0].clientX;
    tScrolling = null;
  }
}, { passive: true });

hero.addEventListener('touchmove', (e) => {
  if (e.touches.length !== 1) return; /* leave pinch to model-viewer */
  const dy = t0y - e.touches[0].clientY;
  const dx = t0x - e.touches[0].clientX;
  if (tScrolling === null) {
    if (Math.abs(dy) < 8 && Math.abs(dx) < 8) return;
    tScrolling = Math.abs(dy) > Math.abs(dx) * 1.4;
  }
  if (tScrolling) {
    e.preventDefault();
    window.scrollBy({ top: dy * 1.6, behavior: 'auto' });
    t0y = e.touches[0].clientY;
    t0x = e.touches[0].clientX;
  }
}, { passive: false });
</script>

</body>
</html>
