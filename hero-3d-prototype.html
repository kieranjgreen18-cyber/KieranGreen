<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kieran Green — Industrial Designer</title>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

<style>
/* ════════════════════════════════════════════════════════════
   DESIGN TOKENS — matched to index.html
════════════════════════════════════════════════════════════ */
:root {
  --c-bg:        #080909;
  --c-primary:   #edeeed;
  --c-secondary: #96a8aa;
  --c-accent:    #5ba0a4;
  --c-rule:      rgba(255,255,255,0.055);

  --f-condensed: 'D-DIN Condensed', sans-serif;
  --f-body:      'D-DIN', sans-serif;

  /* Type scale — verbatim from index.html */
  --t-hero:   clamp(68px, 12vw, 156px);
  --t-micro:  11px;

  --ls-zero:    -0.04em;
  --ls-stencil:  0.22em;
  --lh-display:  0.87;

  --sp-1: 8px;  --sp-2: 16px; --sp-3: 24px; --sp-4: 32px;
  --sp-5: 40px; --sp-6: 48px; --sp-7: 64px; --sp-8: 80px;

  --pad: clamp(24px, 4vw, 48px);

  --ease: cubic-bezier(0.16, 1, 0.3, 1);

  --z-viewer:       0;
  --z-vignette:    10;
  --z-text:        20;
}

/* ════════════════════════════════════════════════════════════
   FONTS
════════════════════════════════════════════════════════════ */
@font-face {
  font-family: 'D-DIN';
  src: url('https://kieranjgreen18-cyber.github.io/KieranGreen/D-DIN.otf') format('opentype');
  font-weight: 100 600; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'D-DIN';
  src: url('https://kieranjgreen18-cyber.github.io/KieranGreen/D-DIN-Italic.otf') format('opentype');
  font-weight: 100 600; font-style: italic; font-display: swap;
}
@font-face {
  font-family: 'D-DIN Condensed';
  src: url('https://kieranjgreen18-cyber.github.io/KieranGreen/D-DINCondensed.otf') format('opentype');
  font-weight: 100 600; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'D-DIN Condensed';
  src: url('https://kieranjgreen18-cyber.github.io/KieranGreen/D-DINCondensed-Bold.otf') format('opentype');
  font-weight: 700 900; font-style: normal; font-display: swap;
}

/* ════════════════════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  background: var(--c-bg);
  color: var(--c-primary);
  font-family: var(--f-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

/* ════════════════════════════════════════════════════════════
   HERO — FULL-BLEED
   Layer order bottom to top:
     z-0  model-viewer  — 100vw × 100svh, HDRI fills screen
     z-10 .hero-vignette — left-side gradient behind text
     z-20 .hero-text, labels, hints — overlaid UI
════════════════════════════════════════════════════════════ */
.hero {
  position: relative;
  width: 100%;
  height: 100svh;
  overflow: hidden;
}

/* ── model-viewer: full bleed ── */
model-viewer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: var(--z-viewer);
  background: transparent;
  --progress-bar-color: var(--c-accent);
  --progress-bar-height: 1px;
  --poster-color: #080909;
}

/* ════════════════════════════════════════════════════════════
   VIGNETTE — localised behind text only
   Covers the left ~60% with a fade so the type is always
   legible regardless of the HDRI sky. The right side (car)
   is fully open to the environment sky/ground.
   Bottom and top fades handle nav + section transitions.
════════════════════════════════════════════════════════════ */
.hero-vignette {
  position: absolute;
  inset: 0;
  z-index: var(--z-vignette);
  pointer-events: none;
  background:
    linear-gradient(
      to right,
      rgba(8,9,9,0.96)  0%,
      rgba(8,9,9,0.88) 12%,
      rgba(8,9,9,0.68) 25%,
      rgba(8,9,9,0.35) 40%,
      rgba(8,9,9,0.08) 52%,
      transparent      62%
    ),
    linear-gradient(
      to top,
      rgba(8,9,9,0.88)  0%,
      rgba(8,9,9,0.35)  8%,
      transparent      18%
    ),
    linear-gradient(
      to bottom,
      rgba(8,9,9,0.55)  0%,
      transparent      14%
    );
}

/* ════════════════════════════════════════════════════════════
   TEXT OVERLAY — bottom-left, matching index.html
════════════════════════════════════════════════════════════ */
.hero-text {
  position: absolute;
  bottom: var(--sp-8);
  left: var(--pad);
  z-index: var(--z-text);
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
  max-width: 52vw;

  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.9s var(--ease), transform 0.9s var(--ease);
}
.hero-text.is-revealed { opacity: 1; transform: translateY(0); }

/* Eyebrow */
.hero-eyebrow {
  font-family: var(--f-condensed);
  font-size: var(--t-micro);
  font-weight: 700;
  letter-spacing: var(--ls-stencil);
  text-transform: uppercase;
  color: var(--c-accent);
  display: flex; align-items: center; gap: var(--sp-2);
  opacity: 0;
  transform: translateX(-12px);
  transition: opacity 0.55s var(--ease) 0.15s,
              transform 0.55s var(--ease) 0.15s;
}
.hero-text.is-revealed .hero-eyebrow { opacity: 1; transform: translateX(0); }
.hero-eyebrow-line { display: block; width: var(--sp-4); height: 1px; background: var(--c-accent); }

/* H1 — exactly index.html's scale and weight */
.hero-h1 {
  font-family: var(--f-condensed);
  font-size: var(--t-hero);
  font-weight: 100;
  letter-spacing: var(--ls-zero);
  line-height: var(--lh-display);
  text-transform: uppercase;
  color: var(--c-primary);
}
.hero-h1 em { font-style: italic; color: var(--c-accent); letter-spacing: -0.03em; }

/* Per-line stagger — same pattern as index.html */
.hero-h1 .line { display: block; overflow: hidden; }
.hero-h1 .word {
  display: inline-block;
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 0.9s var(--ease), transform 0.9s var(--ease);
}
.hero-text.is-revealed .hero-h1 .line:nth-child(1) .word { opacity:1; transform:none; transition-delay: 0.28s; }
.hero-text.is-revealed .hero-h1 .line:nth-child(2) .word { opacity:1; transform:none; transition-delay: 0.40s; }
.hero-text.is-revealed .hero-h1 .line:nth-child(3) .word { opacity:1; transform:none; transition-delay: 0.52s; }
.hero-text.is-revealed .hero-h1 .line:nth-child(4) .word { opacity:1; transform:none; transition-delay: 0.64s; }

/* Sub */
.hero-sub {
  font-family: var(--f-body);
  font-size: 15px; font-weight: 300;
  letter-spacing: 0.04em; line-height: 1.75;
  text-transform: uppercase;
  color: var(--c-primary);
  opacity: 0;
  max-width: 360px;
  transform: translateY(10px);
  transition: opacity 0.7s var(--ease) 0.72s,
              transform 0.7s var(--ease) 0.72s;
}
.hero-text.is-revealed .hero-sub { opacity: 0.55; transform: translateY(0); }

/* Availability */
.hero-avail {
  font-family: var(--f-condensed);
  font-size: var(--t-micro); font-weight: 700;
  letter-spacing: var(--ls-stencil); text-transform: uppercase;
  color: var(--c-accent);
  display: flex; align-items: center; gap: var(--sp-1);
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.7s var(--ease) 0.84s,
              transform 0.7s var(--ease) 0.84s;
}
.hero-text.is-revealed .hero-avail { opacity: 1; transform: translateY(0); }
.hero-avail-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--c-accent);
  box-shadow: 0 0 8px rgba(91,160,164,0.8);
  animation: pulse 2.5s ease infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; box-shadow: 0 0 8px rgba(91,160,164,0.8); }
  50%      { opacity:.35; box-shadow: 0 0 0 rgba(91,160,164,0); }
}

/* Scroll hint — bottom-right */
.hero-scroll {
  position: absolute;
  bottom: var(--sp-8); right: var(--pad);
  z-index: var(--z-text);
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  font-family: var(--f-condensed);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--c-secondary);
  opacity: 0;
  transition: opacity 0.8s var(--ease) 0.9s;
}
.hero-scroll.is-revealed { opacity: 0.6; }
.hero-scroll-line {
  width: 1px; height: var(--sp-6);
  background: linear-gradient(to bottom, var(--c-secondary), transparent);
  animation: scrollPulse 2.2s ease infinite;
}
@keyframes scrollPulse {
  0%,100% { opacity:.4; transform: scaleY(1); }
  50%     { opacity:.9; transform: scaleY(.6); }
}

/* Corner labels */
.model-label {
  position: absolute;
  font-family: var(--f-condensed);
  font-size: 8px; font-weight: 700;
  letter-spacing: 0.24em; text-transform: uppercase;
  color: rgba(91,160,164,0.22);
  pointer-events: none;
  z-index: var(--z-text);
}
.model-label-br { bottom: 18px; right: 22px; text-align: right; }

/* Drag hint */
.model-hint {
  position: absolute;
  bottom: 22%; left: 62%; transform: translateX(-50%);
  font-family: var(--f-condensed);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(91,160,164,0.4);
  display: flex; align-items: center; gap: 7px;
  white-space: nowrap; pointer-events: none;
  z-index: var(--z-text);
  transition: opacity 1s ease;
}
.model-hint-icon {
  width: 14px; height: 14px;
  border: 1px solid rgba(91,160,164,0.3); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
}
.model-hint.hidden { opacity: 0; }

/* Error state */
.model-error {
  display: none; position: absolute; inset: 0;
  z-index: var(--z-text);
  align-items: center; justify-content: center;
  flex-direction: column; gap: var(--sp-2);
  font-family: var(--f-condensed);
  font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(91,160,164,0.35); text-align: center;
}
.model-error.visible { display: flex; }

/* ════════════════════════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════════════════════════ */
@media (max-width: 860px) {
  .hero-text { max-width: 80vw; }
  .hero-scroll { display: none; }
}

@media (max-width: 480px) {
  .hero-text {
    bottom: var(--sp-6);
    max-width: calc(100vw - var(--pad) * 2);
  }
  .hero-vignette {
    background:
      linear-gradient(to top,    rgba(8,9,9,0.96) 0%, rgba(8,9,9,0.5) 16%, transparent 36%),
      linear-gradient(to bottom, rgba(8,9,9,0.45) 0%, transparent 12%),
      linear-gradient(to right,  rgba(8,9,9,0.3)  0%, transparent 50%);
  }
}

model-viewer::part(default-progress-bar) {
  background: var(--c-accent);
  height: 1px;
}
</style>
</head>
<body>

<section class="hero" aria-labelledby="hero-heading">

  <!--
    model-viewer: full-screen.
    camera-orbit "35deg" pushes the car right-of-centre.
    field-of-view 24deg = cinematic telephoto compression.
    skybox-image drives both the background AND lighting.
  -->
  <model-viewer
    id="mini-viewer"
    src="https://kieranjgreen18-cyber.github.io/KieranGreen/minisite.glb"
    alt="Interactive 3D model of Kieran Green's Mini Clubman — drag to rotate"
    camera-controls
    auto-rotate
    auto-rotate-delay="800"
    rotation-per-second="7deg"
    skybox-image="https://modelviewer.dev/shared-assets/environments/spruit_sunrise_1k_HDR.hdr"
    skybox-height="1.2m"
    shadow-intensity="2.0"
    shadow-softness="0.7"
    exposure="0.9"
    camera-orbit="35deg 78deg 72%"
    min-camera-orbit="auto 70deg auto"
    max-camera-orbit="auto 86deg auto"
    field-of-view="18deg"
    min-field-of-view="14deg"
    max-field-of-view="24deg"
    interaction-prompt="none"
    ar
    ar-modes="webxr scene-viewer quick-look"
    loading="eager"
    tone-mapping="commerce"
  ></model-viewer>

  <!-- Gradient only behind text, right side open to HDRI -->
  <div class="hero-vignette" aria-hidden="true"></div>

  <!-- Text — bottom-left, matching index.html -->
  <div class="hero-text" id="hero-text">
    <p class="hero-eyebrow" aria-hidden="true">
      <span class="hero-eyebrow-line"></span>
      Industrial Designer
    </p>
    <h1 class="hero-h1" id="hero-heading">
      <span class="line"><span class="word">Imagining</span></span>
      <span class="line"><span class="word">your</span></span>
      <span class="line"><span class="word"><em>future,</em></span></span>
      <span class="line"><span class="word">today.</span></span>
    </h1>
    <p class="hero-sub">
      CAD modeling, form development, and product visualization —
      from first sketch to something you can hold.
    </p>
    <div class="hero-avail" aria-label="Available for work">
      <div class="hero-avail-dot" aria-hidden="true"></div>
      Available
    </div>
  </div>

  <!-- Scroll hint — bottom-right -->
  <div class="hero-scroll" id="hero-scroll" aria-hidden="true">
    <div class="hero-scroll-line"></div>
    Scroll
  </div>

  <!-- Corner label — bottom-right only -->
  <span class="model-label model-label-br" aria-hidden="true">MINI CLUBMAN · RHINO 3D · FDM</span>

  <!-- Drag hint -->
  <div class="model-hint" id="model-hint" aria-hidden="true">
    <div class="model-hint-icon">↻</div>
    Drag to rotate
  </div>

  <!-- Error state -->
  <div class="model-error" id="model-error" role="alert">
    <span>Model unavailable</span>
    <span style="opacity:.4;font-size:9px;letter-spacing:.18em;">CHECK GLB PATH</span>
  </div>

</section>

<script>
'use strict';

/* ─── Reveal ──────────────────────────────────────────────── */
const heroText   = document.getElementById('hero-text');
const heroScroll = document.getElementById('hero-scroll');

function revealHero() {
  requestAnimationFrame(() => {
    heroText.classList.add('is-revealed');
    heroScroll.classList.add('is-revealed');
  });
}
if (document.readyState === 'complete') {
  setTimeout(revealHero, 80);
} else {
  window.addEventListener('load', () => setTimeout(revealHero, 80));
}

/* ─── Drag hint ───────────────────────────────────────────── */
const viewer  = document.getElementById('mini-viewer');
const hint    = document.getElementById('model-hint');
const errorEl = document.getElementById('model-error');

let hintDone = false;
function dismissHint() {
  if (hintDone) return; hintDone = true;
  hint.classList.add('hidden');
}
viewer.addEventListener('camera-change', dismissHint, { once: true });
setTimeout(dismissHint, 5000);

viewer.addEventListener('error', () => {
  errorEl.classList.add('visible');
  console.warn('[model-viewer] load error:', viewer.src);
});

/* ─── Automotive paint override ──────────────────────────── */
viewer.addEventListener('load', async () => {
  await viewer.updateComplete;
  const model = viewer.model;
  if (!model) return;

  const skipPattern = /glass|window|lens|tyre|tire|rubber|wheel|chrome|mirror/i;
  const bodyPattern = /body|paint|panel|car|exterior|shell|chassis/i;
  let bodyMatFound  = false;

  (model.materials || []).forEach((mat, i) => {
    const name = mat.name || '';
    if (skipPattern.test(name)) return;
    const pbr = mat.pbrMetallicRoughness;
    if (!pbr) return;

    if (bodyPattern.test(name) || (!bodyMatFound && i === 0)) {
      bodyMatFound = true;
      pbr.setBaseColorFactor([0.012, 0.048, 0.022, 1.0]); // deep BRG
      pbr.setMetallicFactor(0.0);
      pbr.setRoughnessFactor(0.36);
      if (mat.extensions?.KHR_materials_clearcoat) {
        mat.extensions.KHR_materials_clearcoat.clearcoatFactor          = 1.0;
        mat.extensions.KHR_materials_clearcoat.clearcoatRoughnessFactor = 0.06;
      }
    } else {
      pbr.setBaseColorFactor([0.04, 0.04, 0.04, 1.0]);
      pbr.setMetallicFactor(0.3);
      pbr.setRoughnessFactor(0.55);
    }
  });
});

/* ═══════════════════════════════════════════════════════════
   SCROLL / ZOOM CONFLICT RESOLUTION
   ───────────────────────────────────────────────────────────
   Problem: model-viewer captures all pointer events including
   scroll-wheel, which blocks the page from scrolling when the
   cursor is over the hero.

   Solution A — Wheel:
   Listen on the hero section (non-passive, so we can call
   preventDefault). Stop the event reaching model-viewer and
   manually call window.scrollBy. This routes scroll-wheel
   entirely to the page. The model keeps drag-to-rotate
   (mouse drag is a pointer event, not a wheel event).

   Solution B — Touch (mobile):
   model-viewer needs touch events for drag-rotate and
   pinch-zoom. We let those through by default. But when we
   detect a primarily-vertical single-finger swipe (user is
   trying to scroll the page, not rotate the car), we
   intercept and forward to window.scrollBy instead.

   Future scroll engine integration:
   If you add GSAP ScrollTrigger or Lenis:
     - Remove the 'wheel' listener below entirely.
       Your scroll engine's own wheel handler will take over.
     - Keep the touch forwarding OR use ScrollTrigger's
       normalizeScroll() which handles this automatically.
     - Optionally add `data-scroll-ignore` to the viewer and
       configure your engine to skip pointer capture inside it.
═══════════════════════════════════════════════════════════ */
const hero = document.querySelector('.hero');

/* ── Wheel → page scroll ─────────────────────────────────── */
hero.addEventListener('wheel', (e) => {
  // Let ctrl/meta+wheel through — that's browser zoom
  if (e.ctrlKey || e.metaKey) return;

  e.preventDefault();
  e.stopPropagation();

  window.scrollBy({
    top:  e.deltaY,
    left: e.deltaX,
    behavior: 'auto'
  });
}, { passive: false });

/* ── Touch → vertical swipe forwards to page ─────────────── */
let t0y = 0, t0x = 0, tScrolling = false;

hero.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    t0y = e.touches[0].clientY;
    t0x = e.touches[0].clientX;
    tScrolling = false;
  }
}, { passive: true });

hero.addEventListener('touchmove', (e) => {
  if (e.touches.length !== 1) return; // let pinch reach model-viewer

  const dy = t0y - e.touches[0].clientY;
  const dx = t0x - e.touches[0].clientX;

  if (!tScrolling) {
    if (Math.abs(dy) < 8 && Math.abs(dx) < 8) return; // not enough movement yet
    tScrolling = Math.abs(dy) > Math.abs(dx) * 1.4;    // commit: scroll vs rotate
  }

  if (tScrolling) {
    e.preventDefault();
    window.scrollBy({ top: dy * 1.6, behavior: 'auto' });
    t0y = e.touches[0].clientY;
    t0x = e.touches[0].clientX;
  }
  // else: let model-viewer rotate the car
}, { passive: false });
</script>

</body>
</html>
